{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Document</title>
    <style>
        .card img{
            height: 300px;
            object-fit: cover;
        }
        .boc_hinh{
            overflow: hidden;
        }
        .card-rechuot img{
            transition: transform 0.5s ease, filter 0.5s ease
        }
        .card-rechuot:hover img{
            transform: scale(1.2);
            filter: brightness(0.8);
        }
        body{
            background-image: url("{% static 'blog/images/restaurant.jpg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .phu-den{
            height: 100vh;
            width: 100%;
            background: rgba(0,0,0,0.5);
        }
        .thuy-tinh{
            height: 100vh;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="thuy-tinh">
        <nav class="navbar navbar-expand-lg bg-white shadow py-3 mb-5">
            <div class="container">
                <a href="" class="navbar-brand fw-bold text-danger">Lotteria</a>
                <div class="ms-auto d-flex gap-2">
                    <button class="btn btn-outline-danger rounded-pill">FIND A STORE NEAR YOU</button>
                    <button class="btn btn-warning rounded-pill">CAREER OPPOTUNITIES</button>
                    <button class="btn btn-danger rounded-pill">PRODUCT PROPOSAL</button>
                    <button class="btn btn-outline-danger rounded-pill">DOWNLOAD APP</button>
                </div>
            </div>
        </nav>

        <main class="d-flex align-items-center">
            <div class="container">
                <div class="row">
                    <div class="col-6">
                        <div class="card p-3 rounded-4 shadow-lg card-rechuot">
                            <div class="boc_hinh">
                                <img src="{% static 'blog/images/food.jpg' %}" alt="" class="card-img-top rounded-4">
                            </div>
                            
                            <div class="card-body text-center">
                                <h3 class="text-danger fw-bold">ORDER NOW</h3>
                                <p>View menu and order</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card p-3 rounded-4 shadow-lg card-rechuot">
                            <div class="boc_hinh">
                                <img src="{% static 'blog/images/restaurant.jpg' %}" alt="" class="card-img-top rounded-4">
                            </div>
                            
                            <div class="card-body text-center">
                                <h3 class="text-danger fw-bold">FRANCHISING</h3>
                                <p>Lotteria store franchise</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!--
    <h1>Trang chủ</h1>
    <p>Xin chào {{username}}</p>
    <p>Điểm số các môn</p>
    <ul>
        <li>Điểm toán: {{grades.0}}</li>
        <li>Điểm lý: {{grades.1}}</li>
        <li>Điểm hóa: {{grades.2}}</li>
    </ul>
    -->
    

</body>
</html>
